<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebVDB · 07 builder</title>
    <style>
      :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; overflow: hidden; background: #0b1020; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }
      #app canvas { width: 100%; height: 100%; }
      #panel {
        position: fixed; top: 0; left: 0; margin: 0.75rem; padding: 0.75rem 0.9rem;
        width: 19rem; max-width: calc(100vw - 1.5rem);
        background: rgba(12, 16, 32, 0.78); color: #e6ebff; border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.12); backdrop-filter: blur(6px);
        font-size: 0.8rem; line-height: 1.35;
      }
      #panel h1 { font-size: 0.95rem; margin: 0 0 0.25rem; }
      #panel a { color: #9db4ff; }
      #stats { font-variant-numeric: tabular-nums; opacity: 0.85; margin: 0.35rem 0 0.6rem; white-space: pre-line; }
      .row { display: flex; align-items: center; gap: 0.4rem; margin: 0.3rem 0; flex-wrap: wrap; }
      button { font: inherit; background: rgba(255,255,255,0.1); color: inherit; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; padding: 0.3rem 0.55rem; cursor: pointer; }
      button:hover { background: rgba(255,255,255,0.18); }
      label.check { display: flex; align-items: center; gap: 0.35rem; cursor: pointer; }
      #verify { font-size: 0.75rem; margin-top: 0.4rem; }
      #verify .ok { color: #34d399; }
      #verify .bad { color: #ff9b9b; }
      #err { color: #ff9b9b; white-space: pre-wrap; margin-top: 0.5rem; }
      #panel.test-hidden { display: none; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="panel">
      <h1>07 · builder</h1>
      <div><a href="/">&larr; all demos</a> · procedural dense &rarr; NanoVDB round trip</div>
      <div id="stats">booting…</div>
      <div class="row">
        <button id="regen" type="button">regenerate (new seed)</button>
      </div>
      <div class="row">
        <label class="check"><input type="checkbox" id="quantize-toggle" /> quantize to Fp8</label>
      </div>
      <div class="row">
        <button id="download" type="button">download .nvdb</button>
      </div>
      <div id="verify"></div>
      <div id="err"></div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
